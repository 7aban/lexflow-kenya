<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LexFlow Kenya</title>
    <style>
      :root {
        --lf-navy: #0F1B33;
        --lf-gold: #D4A34A;
        --lf-border: #E5E7EB;
        --lf-bg: #F4F6F8;
        --lf-text: #111827;
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      #root {
        min-height: 100%;
        margin: 0;
      }

      body {
        background: var(--lf-bg);
        color: var(--lf-text);
        font-family: Inter, "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button,
      a,
      input,
      select,
      textarea {
        transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease, transform 0.18s ease;
      }

      button:hover:not(:disabled),
      a:hover {
        transform: translateY(-1px);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.6;
      }

      input:focus,
      select:focus,
      textarea:focus {
        border-color: var(--lf-gold) !important;
        box-shadow: 0 0 0 3px rgba(212, 163, 74, 0.18);
        outline: none;
      }

      .lexflow-startup {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--lf-text);
      }

      .lexflow-startup-card {
        width: 360px;
        max-width: calc(100vw - 32px);
        padding: 22px;
        border: 1px solid var(--lf-border);
        border-radius: 10px;
        background: #ffffff;
        box-shadow: 0 14px 35px rgba(15, 27, 51, 0.08);
      }

      .lexflow-startup-card strong {
        display: block;
        margin-bottom: 6px;
        color: var(--lf-navy);
      }

      .lexflow-startup-card span {
        color: #6b7280;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="lexflow-startup">
        <div class="lexflow-startup-card">
          <strong>LexFlow Kenya</strong>
          <span>Starting the secure login screen...</span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
