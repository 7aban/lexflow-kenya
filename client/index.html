<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LexFlow Kenya</title>
    <style>
      html,
      body,
      #root {
        min-height: 100%;
        margin: 0;
      }

      body {
        background: #f3f4f6;
      }

      .lexflow-startup {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #111827;
      }

      .lexflow-startup-card {
        width: 360px;
        max-width: calc(100vw - 32px);
        padding: 22px;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        background: #ffffff;
        box-sizing: border-box;
      }

      .lexflow-startup-card strong {
        display: block;
        margin-bottom: 6px;
        color: #1b3a5c;
      }

      .lexflow-startup-card span {
        color: #6b7280;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="lexflow-startup">
        <div class="lexflow-startup-card">
          <strong>LexFlow Kenya</strong>
          <span>Starting the secure login screen...</span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
